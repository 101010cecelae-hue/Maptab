<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jemulpo 3D Interactive Map</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(#dfe9f3, #ffffff);
}

/* Scene */
.scene {
  width: 100vw;
  height: 100vh;
  perspective: 1500px;
}

/* Map */
.map {
  width: 1200px;
  height: 1200px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform-style: preserve-3d;
  transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-20deg) scale(1);
  background: #f8f8f8;
  border-radius: 40px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.2);
}

/* Roads */
.road {
  position: absolute;
  background: white;
  border-radius: 20px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

/* Buildings */
.building {
  position: absolute;
  width: 70px;
  height: 70px;
  background: linear-gradient(145deg, #e0e0e0, #cfcfcf);
  border-radius: 12px;
  transform: translateZ(30px);
  box-shadow: 0 20px 30px rgba(0,0,0,0.25);
}

/* Trees */
.tree {
  position: absolute;
  width: 18px;
  height: 18px;
  background: #2ecc71;
  border-radius: 50%;
}

/* Markers */
.marker {
  position: absolute;
  padding: 6px 10px;
  background: rgba(255,255,255,0.9);
  border-radius: 15px;
  font-size: 12px;
  cursor: pointer;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  user-select: none;
}

/* Route */
.route {
  position: absolute;
  height: 6px;
  background: #007aff;
  border-radius: 10px;
  width: 0;
  transition: width 1s ease;
}

/* UI */
.ui {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(20px);
  padding: 15px 25px;
  border-radius: 25px;
  cursor: pointer;
  font-weight: 500;
}
</style>
</head>

<body>

<div class="scene">
  <div class="map" id="map">

    <!-- Roads -->
    <div class="road" style="width:800px;height:30px;top:500px;left:200px;"></div>
    <div class="road" style="width:30px;height:600px;top:200px;left:600px;"></div>

    <!-- Buildings -->
    <div class="building" style="top:420px;left:400px;"></div>
    <div class="building" style="top:480px;left:500px;"></div>
    <div class="building" style="top:530px;left:650px;"></div>

    <!-- Trees -->
    <div class="tree" style="top:450px;left:300px;"></div>
    <div class="tree" style="top:550px;left:700px;"></div>

    <!-- Landmarks -->
    <div class="marker" style="top:520px;left:350px;" onclick="selectStart()">🏮 Chinatown</div>
    <div class="marker" style="top:480px;left:750px;" onclick="selectEnd()">🎪 Festival</div>

    <!-- Route -->
    <div id="route" class="route" style="top:510px;left:350px;"></div>

  </div>
</div>

<div class="ui" onclick="drawRoute()">Start Navigation</div>

<script>
let map = document.getElementById("map");
let angle = -20;
let scale = 1;
let start = false;
let end = false;

/* Select points */
function selectStart(){
  start = true;
  alert("Chinatown selected");
}
function selectEnd(){
  end = true;
  alert("Festival selected");
}

/* Draw route */
function drawRoute(){
  if(start && end){
    document.getElementById("route").style.width = "400px";
  } else {
    alert("Select both locations");
  }
}

/* Drag rotate */
document.addEventListener("mousemove", (e)=>{
  if(e.buttons === 1){
    angle += e.movementX * 0.1;
    update();
  }
});

/* Zoom */
document.addEventListener("wheel", (e)=>{
  scale += e.deltaY * -0.001;
  scale = Math.min(Math.max(.6, scale), 2);
  update();
});

/* Update transform */
function update(){
  map.style.transform =
    `translate(-50%, -50%) rotateX(60deg) rotateZ(${angle}deg) scale(${scale})`;
}
</script>

</body>
</html>
